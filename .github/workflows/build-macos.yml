name: Build macOS app

# Builds FlowDictate.app on a real Apple-Silicon Mac in GitHub's cloud
# (can't be built from Windows) and attaches it to the given release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the .app to"
        default: "v1.0.0"
        required: true
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest   # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System audio lib
        run: brew install portaudio || true

      - name: Install deps and build .app
        working-directory: mac
        run: |
          python -m pip install --upgrade pip
          pip install faster-whisper sounddevice pynput pyobjc rumps pyinstaller
          pyinstaller --noconfirm --clean flowdictate_mac.spec
          cd dist
          ditto -c -k --keepParent FlowDictate.app FlowDictate-macOS-arm64.zip
          ls -lh FlowDictate-macOS-arm64.zip

      - name: Upload as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowDictate-macOS-arm64
          path: mac/dist/FlowDictate-macOS-arm64.zip

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" mac/dist/FlowDictate-macOS-arm64.zip \
            --clobber --repo "${{ github.repository }}"
